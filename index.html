<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fake Store</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Fake Online Store</h1>

  <div id="products">
    <h2>Products</h2>
    <div>
      <p>Product 1 - $10</p>
      <button onclick="addToCart('Product 1', 10)">Buy</button>
    </div>
    <div>
      <p>Product 2 - $20</p>
      <button onclick="addToCart('Product 2', 20)">Buy</button>
    </div>
  </div>

  <h2>Your Cart</h2>
  <ul id="cart"></ul>
  <button onclick="placeOrder()">Place Order</button>

  <h2>All Orders</h2>
  <div id="orders"></div>

  <script src="app.js"></script>
</body>
</html>
