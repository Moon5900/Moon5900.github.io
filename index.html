<!DOCTYPE html>
<html>
<head>
<title>Fake Store</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<h1>Fantasy Item Shop</h1>

<div>
<h3>Dragon Plush - 50 Gold</h3>
<button onclick="addItem('Dragon Plush',50)">Add to Cart</button>
</div>

<div>
<h3>Magic Potion - 25 Gold</h3>
<button onclick="addItem('Magic Potion',25)">Add to Cart</button>
</div>

<div>
<h3>Wizard Hat - 40 Gold</h3>
<button onclick="addItem('Wizard Hat',40)">Add to Cart</button>
</div>

<h2>Cart</h2>

<ul id="cart"></ul>

Total: <span id="total">0</span> Gold

<h2>Checkout</h2>

Name  
<input id="name">

<br><br>

Notes  
<textarea id="notes"></textarea>

<br><br>

<button onclick="placeOrder()">Place Order</button>

<script>

const supabase = window.supabase.createClient(
"https://hgajefemixmctbtpkwpu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhnYWplZmVtaXhtY3RidHBrd3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjc4NDMsImV4cCI6MjA4OTAwMzg0M30.st6stAUAZHmSZqT_KRFFgD2MkeTGdiqwOp3Ndb235rs"
)

let cart = []
let total = 0

function addItem(name,price){

cart.push(name)
total += price

renderCart()

}

function renderCart(){

const cartList = document.getElementById("cart")
cartList.innerHTML = ""

cart.forEach(item =>{

let li = document.createElement("li")
li.textContent = item
cartList.appendChild(li)

})

document.getElementById("total").textContent = total

}

async function placeOrder(){

const name = document.getElementById("name").value
const notes = document.getElementById("notes").value

const { data, error } = await supabase
.from("orders")
.insert([
{
name:name,
items:cart.join(", "),
total:total + " Gold",
notes:notes
}
])

if(error){

alert("Error placing order")

}else{

alert("Order placed!")

cart=[]
total=0
renderCart()

}

}

</script>

</body>
</html>
