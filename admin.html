<!DOCTYPE html>
<html>
<head>

<title>Order Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<h1>Orders</h1>

<table border="1">

<thead>
<tr>
<th>Name</th>
<th>Items</th>
<th>Total</th>
<th>Notes</th>
<th>Date</th>
</tr>
</thead>

<tbody id="orders"></tbody>

</table>

<script>

const supabase = window.supabase.createClient(
"https://hgajefemixmctbtpkwpu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhnYWplZmVtaXhtY3RidHBrd3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjc4NDMsImV4cCI6MjA4OTAwMzg0M30.st6stAUAZHmSZqT_KRFFgD2MkeTGdiqwOp3Ndb235rs"
)

async function loadOrders(){

const { data } = await supabase
.from("orders")
.select("*")
.order("created_at",{ascending:false})

const table = document.getElementById("orders")

data.forEach(order =>{

let row = document.createElement("tr")

row.innerHTML = `
<td>${order.name}</td>
<td>${order.items}</td>
<td>${order.total}</td>
<td>${order.notes}</td>
<td>${order.created_at}</td>
`

table.appendChild(row)

})

}

loadOrders()

</script>

</body>
</html>
